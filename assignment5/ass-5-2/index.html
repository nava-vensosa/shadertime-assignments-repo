<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Remap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #canvas { display: block; }
    #gradients {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    #gradients label {
      color: #fff;
      font-family: monospace;
      font-size: 12px;
    }
    #gradients canvas {
      display: block;
      width: 400px;
      height: 24px;
      border: 1px solid #555;
      border-radius: 3px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.170.0",
        "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/",
        "lil-gui": "https://esm.sh/lil-gui@0.20.0"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="gradients">
    <div>
      <label>Standard RGB Spectrum</label>
      <canvas id="gradient-standard"></canvas>
    </div>
    <div>
      <label>Custom Gradient</label>
      <canvas id="gradient-custom"></canvas>
    </div>
  </div>
  <script type="module" src="index.js"></script>
</body>
</html>
